<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">

<title>Sagar Awasthi | DevOps Engineer</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
:root {
    --bg: #0f172a;
    --card: #1e293b;
    --text: #e2e8f0;
    --accent: #38bdf8;
}

body {
    margin: 0;
    font-family: system-ui;
    background: var(--bg);
    color: var(--text);
}

section {
    max-width: 1100px;
    margin: auto;
    padding: 60px 20px;
}

h2 {
    border-left: 4px solid var(--accent);
    padding-left: 10px;
}

/* HERO CENTERED */
.hero {
    padding: 80px 20px;
    background: linear-gradient(135deg, #020617, #1e293b);
    text-align: center;
}

.hero img {
    width: 220px;
    height: 220px;
    border-radius: 50%;
    border: 3px solid var(--accent);
    box-shadow: 0 0 25px var(--accent);
}

.typing {
    color: var(--accent);
    height: 30px;
}

/* BUTTONS */
.hero-buttons a {
    display: inline-block;
    margin: 10px;
    padding: 10px 16px;
    background: var(--accent);
    color: black;
    border-radius: 6px;
    text-decoration: none;
}

/* CARDS */
.card {
    background: var(--card);
    padding: 20px;
    border-radius: 10px;
    margin: 20px 0;
}

/* GITHUB IMAGES */
.github-img {
    width: 100%;
    max-width: 800px;
    margin: 20px auto;
    display: block;
    border-radius: 10px;
}

/* CONTACT FIX */
.contact-container {
    display: flex;
    justify-content: center;
}

form {
    width: 100%;
    max-width: 500px;
    background: var(--card);
    padding: 20px;
    border-radius: 10px;
    box-sizing: border-box;
}

form input,
form textarea {
    width: 100%;
    padding: 12px;
    margin: 10px 0;
    border-radius: 6px;
    border: none;
    background: #334155;
    color: white;
    box-sizing: border-box;
}

form button {
    width: 100%;
    padding: 12px;
    border: none;
    background: var(--accent);
    color: black;
    font-weight: bold;
    border-radius: 6px;
}

/* SOCIAL */
.socials {
    display: flex;
    justify-content: center;
    gap: 20px;
}

.socials a {
    width: 50px;
    height: 50px;
    background: var(--card);
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 50%;
    color: white;
}
</style>
</head>

<script>
// typing
const roles=["DevOps Engineer","Cloud Engineer","CI/CD Specialist"];
let i=0,j=0,del=false;
function type(){
let text=roles[i];
j=del?j-1:j+1;
document.querySelector(".typing").textContent=text.substring(0,j);
if(!del&&j===text.length){del=true;setTimeout(type,1000);return;}
if(del&&j===0){del=false;i=(i+1)%roles.length;}
setTimeout(type,del?50:100);
}
type();
</script>
