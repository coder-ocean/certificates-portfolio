<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sagar Awasthi | DevOps Engineer</title>
  <meta name="description" content="DevOps Engineer specializing in AWS, Kubernetes, and CI/CD automation.">

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/typed.js@2.0.12"></script>

  <style>
    /* ====================== */
    /* ROOT VARIABLES */
    /* ====================== */
    :root {
      --bg: #0f172a;
      --card: #1e293b;
      --text: #e2e8f0;
      --accent: #38bdf8;
    }

    /* ====================== */
    /* GENERAL */
    /* ====================== */
    body {
      margin: 0;
      font-family: system-ui;
      background: var(--bg);
      color: var(--text);
      scroll-behavior: smooth;
    }

    section {
      max-width: 1100px;
      margin: auto;
      padding: 60px 20px;
      opacity: 0;
      transform: translateY(30px);
      transition: all 0.8s ease;
    }

    section.visible {
      opacity: 1;
      transform: translateY(0);
    }

    h2 {
      border-left: 4px solid var(--accent);
      padding-left: 10px;
      margin-bottom: 25px;
    }

    /* ====================== */
    /* LOADER */
    /* ====================== */
    #loader {
      position: fixed;
      width: 100%;
      height: 100%;
      background: var(--bg);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 9999;
    }

    #loader div {
      width: 50px;
      height: 50px;
      border: 5px solid var(--accent);
      border-top: 5px solid var(--text);
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    /* ====================== */
    /* HERO */
    /* ====================== */
    .hero {
      padding: 90px 20px;
      background: linear-gradient(135deg, #020617, #1e293b);
    }

    .hero-container {
      display: flex;
      justify-content: space-between;
      flex-wrap: wrap;
      align-items: center;
    }

    .hero-text h1 {
      font-size: 3rem;
    }

    .hero-buttons a {
      display: inline-block;
      margin: 10px 10px 0 0;
      padding: 10px 16px;
      background: var(--accent);
      color: black;
      border-radius: 6px;
      text-decoration: none;
      font-weight: 600;
      transition: transform 0.3s;
    }

    .hero-buttons a:hover {
      transform: translateY(-4px) scale(1.05);
    }

    .hero-image img {
      width: 220px;
      height: 220px;
      border-radius: 50%;
      border: 3px solid var(--accent);
      transition: transform 0.4s;
    }

    .hero-image img:hover {
      transform: scale(1.08);
    }

    /* ====================== */
    /* CARDS */
    /* ====================== */
    .card {
      background: var(--card);
      padding: 20px;
      border-radius: 10px;
      margin: 20px 0;
      transition: transform 0.3s, box-shadow 0.3s;
      cursor: pointer;
    }

    .card:hover {
      transform: translateY(-5px) scale(1.02);
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
    }

    /* ====================== */
    /* CERTIFICATES */
    /* ====================== */
    .cert-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 20px;
    }

    .cert-card img {
      width: 100%;
      border-radius: 8px;
      cursor: pointer;
      transition: transform 0.3s;
    }

    .cert-card img:hover {
      transform: scale(1.05);
    }

    /* MODAL */
    .modal {
      display: none;
      position: fixed;
      z-index: 999;
      padding-top: 60px;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.9);
    }

    .modal img {
      display: block;
      margin: auto;
      max-width: 90%;
      max-height: 80%;
    }

    .close {
      position: absolute;
      top: 20px;
      right: 35px;
      font-size: 40px;
      color: white;
      cursor: pointer;
    }

    /* ====================== */
    /* SOCIAL ICONS */
    /* ====================== */
    .socials {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin-top: 30px;
    }

    .socials a {
      width: 55px;
      height: 55px;
      background: var(--card);
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      font-size: 22px;
      color: var(--text);
      transition: all 0.3s ease;
    }

    .socials a:hover {
      background: var(--accent);
      color: black;
      transform: scale(1.2) translateY(-3px);
    }

    @media(max-width:768px) {
      .hero-container {
        flex-direction: column-reverse;
        text-align: center;
      }
    }
  </style>
</head>

<body>

  <!-- LOADER -->
  <div id="loader">
    <div></div>
  </div>

  <!-- HERO -->
  <header class="hero">
    <div class="hero-container">

      <div class="hero-text">
        <h1>Sagar Awasthi</h1>
        <p>DevOps Engineer | AWS • Kubernetes • CI/CD</p>

        <div class="hero-buttons">
          <a href="./resume.pdf" target="_blank">View Resume</a>
          <a href="./resume.pdf" download>Download Resume</a>
          <a href="https://github.com/coder-ocean" target="_blank">GitHub</a>
          <a href="https://www.linkedin.com/in/sagar-awasthi-it-services" target="_blank">LinkedIn</a>
        </div>
      </div>

      <div class="hero-image">
        <img src="images/profile_pic.jpg">
      </div>

    </div>
  </header>

  <!-- PROJECTS -->
  <section>
    <h2>🚀 Projects</h2>
    <div class="card">
      <h3>CI/CD Pipeline</h3>
      <a href="https://github.com/coder-ocean/ares-cicd">View Code →</a>
    </div>
    <div class="card">
      <h3>Multi EC2 Deployment</h3>
      <a href="https://github.com/coder-ocean/flask-express-2ec2-app">View Code →</a>
    </div>
    <div class="card">
      <h3>AWS EC2 App</h3>
      <a href="https://github.com/coder-ocean/flask-express-ec2-app">View Code →</a>
    </div>
    <div class="card">
      <h3>Kubernetes Deployment</h3>
      <a href="https://github.com/coder-ocean/K8s-app">View Code →</a>
    </div>
  </section>

  <!-- CERTIFICATES -->
  <section>
    <h2>📜 Certifications</h2>
    <div class="cert-grid">
      <div class="cert-card">
        <img src="images/certificate_TD-SAGA-DO-2306_page-0001.jpg" onclick="openModal(this.src)">
      </div>
      <div class="cert-card">
        <img src="images/DFS-Support_Administrator Beginner -GEN AI L2_page-0001.jpg" onclick="openModal(this.src)">
      </div>
      <div class="cert-card">
        <img src="images/0a33b120-c5e3-4a9a-acba-f60cab91a079_page-0001.jpg" onclick="openModal(this.src)">
      </div>
    </div>
  </section>

  <!-- MODAL -->
  <div id="imgModal" class="modal">
    <span class="close" onclick="closeModal()">&times;</span>
    <img id="modalImg">
  </div>

  <!-- CONTACT -->
  <section>
    <h2>📬 Contact</h2>
    <form action="https://formspree.io/f/mzdkzrzk" method="POST">
      <input type="text" name="name" placeholder="Your Name" required>
      <input type="email" name="email" placeholder="Your Email" required>
      <textarea name="message" placeholder="Your Message"></textarea>
      <button type="submit">Send Message</button>
    </form>
  </section>

  <!-- SOCIAL -->
  <section>
    <div class="socials">
      <a href="https://github.com/coder-ocean"><i class="fab fa-github"></i></a>
      <a href="https://www.linkedin.com/in/sagar-awasthi-it-services"><i class="fab fa-linkedin-in"></i></a>
    </div>
  </section>

  <!-- SCRIPTS -->
  <script>
    // Typed.js Hero
    new Typed("#typed", {
      strings: ["DevOps Engineer", "AWS & Kubernetes", "CI/CD Automation", "Cloud Infrastructure"],
      typeSpeed: 50,
      backSpeed: 25,
      loop: true
    });

    // Modal
    function openModal(src) {
      document.getElementById("imgModal").style.display = "block";
      document.getElementById("modalImg").src = src;
    }
    function closeModal() {
      document.getElementById("imgModal").style.display = "none";
    }

    // Fade-in sections on scroll
    const sections = document.querySelectorAll('section');
    const observer = new IntersectionObserver(entries => {
      entries.forEach(entry => {
        if (entry.isIntersecting) entry.target.classList.add('visible');
      });
    }, { threshold: 0.2 });
    sections.forEach(section => observer.observe(section));

    // Loader
    window.addEventListener("load", () => {
      document.getElementById("loader").style.display = "none";
    });
  </script>
</body>
</html>
