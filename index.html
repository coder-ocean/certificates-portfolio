<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sagar Awasthi | DevOps Engineer</title>

  <meta name="description" content="DevOps Engineer specializing in AWS, Kubernetes, and CI/CD automation.">

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/typed.js@2.0.12"></script>

  <style>
    :root {
      --bg: #0f172a;
      --card: #1e293b;
      --text: #e2e8f0;
      --accent: #38bdf8;
    }

    body {
      margin: 0;
      font-family: system-ui;
      background: var(--bg);
      color: var(--text);
    }

    section {
      max-width: 1100px;
      margin: auto;
      padding: 60px 20px;
    }

    h2 {
      border-left: 4px solid var(--accent);
      padding-left: 10px;
      margin-bottom: 25px;
    }

    /* HERO */
    .hero {
      padding: 90px 20px;
      background: linear-gradient(135deg, #020617, #1e293b);
    }

    .hero-container {
      display: flex;
      justify-content: space-between;
      flex-wrap: wrap;
      align-items: center;
    }

    .hero-text h1 {
      font-size: 3rem;
    }

    .hero-buttons a {
      display: inline-block;
      margin: 10px 10px 0 0;
      padding: 10px 16px;
      background: var(--accent);
      color: black;
      border-radius: 6px;
      text-decoration: none;
      font-weight: 600;
    }

    .hero-image img {
      width: 220px;
      height: 220px;
      border-radius: 50%;
      border: 3px solid var(--accent);
    }

    /* CARDS */
    .card {
      background: var(--card);
      padding: 20px;
      border-radius: 10px;
      margin: 20px 0;
    }

    /* CERTIFICATES */
    .cert-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 20px;
    }

    .cert-card img {
      width: 100%;
      border-radius: 8px;
      cursor: pointer;
      transition: 0.3s;
    }

    .cert-card img:hover {
      transform: scale(1.05);
    }

    /* MODAL */
    .modal {
      display: none;
      position: fixed;
      z-index: 999;
      padding-top: 60px;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.9);
    }

    .modal img {
      display: block;
      margin: auto;
      max-width: 90%;
      max-height: 80%;
    }

    .close {
      position: absolute;
      top: 20px;
      right: 35px;
      font-size: 40px;
      color: white;
      cursor: pointer;
    }

    /* ICONS */
    .socials {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin-top: 30px;
    }

    .socials a {
      width: 55px;
      height: 55px;
      background: #1e293b;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      font-size: 24px;
      color: #e2e8f0;
      transition: all 0.3s ease;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
    }

    .socials a:hover {
      background: #38bdf8;
      color: #0f172a;
      transform: translateY(-6px) scale(1.1);
    }

    .contact-form {
      max-width: 500px;
      margin-top: 20px;
      background: #1e293b;
      padding: 25px;
      border-radius: 10px;
      box-sizing: border-box;
    }

    .contact-form input,
    .contact-form textarea {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      border-radius: 6px;
      border: none;
      outline: none;
      background: #334155;
      color: white;
      font-size: 14px;
      box-sizing: border-box;
      /* 🔥 FIXES OVERFLOW */
    }

    .contact-form textarea {
      resize: vertical;
    }

    .contact-form input::placeholder,
    .contact-form textarea::placeholder {
      color: #94a3b8;
    }

    .contact-form button {
      width: 100%;
      padding: 12px;
      border: none;
      background: #38bdf8;
      color: black;
      font-weight: bold;
      border-radius: 6px;
      cursor: pointer;
      transition: 0.3s;
    }

    .socials a:hover {
      background: var(--accent);
      color: black;
    }

    @media(max-width:768px) {
      .hero-container {
        flex-direction: column-reverse;
        text-align: center;
      }
    }
  </style>
</head>

<body>

  <!-- HERO -->
  <header class="hero">
    <div class="hero-container">

      <div class="hero-text">
        <h1>Sagar Awasthi</h1>
        <p>DevOps Engineer | AWS • Kubernetes • CI/CD</p>

        <div class="hero-buttons">
          <a href="./resume.pdf" target="_blank">View Resume</a>
          <a href="./resume.pdf" download>Download Resume</a>
          <a href="https://github.com/coder-ocean" target="_blank">GitHub</a>
          <a href="https://www.linkedin.com/in/sagar-awasthi-it-services" target="_blank">LinkedIn</a>
        </div>
      </div>

      <div class="hero-image">
        <img src="images/profile_pic.jpg">
      </div>

    </div>
  </header>

  <!-- PROJECTS -->
  <section>
    <h2>🚀 Projects</h2>

    <div class="card">
      <h3>CI/CD Pipeline</h3>
      <a href="https://github.com/coder-ocean/ares-cicd">View Code →</a>
    </div>

    <div class="card">
      <h3>Multi EC2 Deployment</h3>
      <a href="https://github.com/coder-ocean/flask-express-2ec2-app">View Code →</a>
    </div>

    <div class="card">
      <h3>AWS EC2 App</h3>
      <a href="https://github.com/coder-ocean/flask-express-ec2-app">View Code →</a>
    </div>

    <div class="card">
      <h3>Kubernetes Deployment</h3>
      <a href="https://github.com/coder-ocean/K8s-app">View Code →</a>
    </div>

  </section>

  <!-- CERTIFICATES -->
  <section>
    <h2>📜 Certifications</h2>

    <div class="cert-grid">

      <div class="cert-card">
        <img src="images/certificate_TD-SAGA-DO-2306_page-0001.jpg" onclick="openModal(this.src)">
      </div>

      <div class="cert-card">
        <img src="images/DFS-Support_Administrator Beginner -GEN AI L2_page-0001.jpg" onclick="openModal(this.src)">
      </div>

      <div class="cert-card">
        <img src="images/0a33b120-c5e3-4a9a-acba-f60cab91a079_page-0001.jpg" onclick="openModal(this.src)">
      </div>

    </div>
  </section>

  <!-- MODAL -->
  <div id="imgModal" class="modal">
    <span class="close" onclick="closeModal()">&times;</span>
    <img id="modalImg">
  </div>

  <!-- CONTACT -->
  <section>
    <h2>📬 Contact</h2>
    <form action="https://formspree.io/f/mzdkzrzk" method="POST">
      <input type="text" name="name" placeholder="Your Name" required>
      <input type="email" name="email" placeholder="Your Email" required>
      <textarea name="message" placeholder="Your Message"></textarea>
      <button type="submit">Send Message</button>
    </form>
  </section>

  <!-- CONNECT -->
  <section style="text-align:center; margin-top:40px;">

    <div class="socials">

      <a href="https://github.com/coder-ocean" target="_blank" aria-label="GitHub">
        <i class="fab fa-github"></i>
      </a>

      <a href="https://www.linkedin.com/in/sagar-awasthi-it-services" target="_blank" aria-label="LinkedIn">
        <i class="fab fa-linkedin-in"></i>
      </a>

    </div>

  </section>
  <!-- SCRIPT -->
  <script>
    function openModal(src) {
      document.getElementById("imgModal").style.display = "block";
      document.getElementById("modalImg").src = src;
    }

    function closeModal() {
      document.getElementById("imgModal").style.display = "none";
    }
  </script>

</body>

</html>
