<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sagar Awasthi | DevOps Engineer</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
:root {
    --bg: #0f172a;
    --card: rgba(30,41,59,0.7);
    --text: #e2e8f0;
    --accent: #38bdf8;
}

body {
    margin: 0;
    font-family: 'Inter', sans-serif;
    background: var(--bg);
    color: var(--text);
}

/* FIX WIDTH */
section {
    max-width: 900px;
    margin: auto;
    padding: 50px 20px;
}

/* HEADINGS */
h2 {
    border-left: 4px solid var(--accent);
    padding-left: 10px;
    font-size: 1.5rem;
}

/* HERO */
.hero {
    padding: 60px 20px;
    text-align: center;
}

.hero img {
    width: 180px;
    height: 180px;
    border-radius: 50%;
    border: 3px solid var(--accent);
    box-shadow: 0 0 20px var(--accent);
}

.typing {
    color: var(--accent);
    height: 25px;
}

/* BUTTONS */
.hero-buttons a {
    display: inline-block;
    margin: 8px;
    padding: 8px 14px;
    background: var(--accent);
    color: black;
    border-radius: 6px;
    text-decoration: none;
    font-size: 0.9rem;
}

/* CARDS */
.card {
    background: var(--card);
    padding: 16px;
    border-radius: 10px;
    margin: 15px 0;
}

/* GITHUB FIX */
.github-container {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 20px;
}

.github-img {
    width: 100%;
    max-width: 600px;
    border-radius: 8px;
}

/* CONTACT */
.contact-container {
    display: flex;
    justify-content: center;
}

form {
    width: 100%;
    max-width: 450px;
    background: var(--card);
    padding: 18px;
    border-radius: 10px;
    box-sizing: border-box;
}

form input, form textarea {
    width: 100%;
    padding: 10px;
    margin: 8px 0;
    border-radius: 6px;
    border: none;
    background: #334155;
    color: white;
    box-sizing: border-box;
}

form button {
    width: 100%;
    padding: 10px;
    background: var(--accent);
    border: none;
    border-radius: 6px;
    color: black;
}

/* SOCIAL */
.socials {
    display: flex;
    justify-content: center;
    gap: 20px;
}

.socials a {
    width: 50px;
    height: 50px;
    background: var(--card);
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 50%;
    color: white;
    transition: 0.3s;
}

.socials a:hover {
    background: var(--accent);
    color: black;
    transform: translateY(-5px);
    box-shadow: 0 0 20px var(--accent);
}
</style>
</head>

<body>

<header class="hero">
    <img src="images/profile_pic.jpg">
    <h1>Sagar Awasthi</h1>
    <h2 class="typing"></h2>
    <p>DevOps Engineer with AWS, Kubernetes, and CI/CD experience.</p>

    <div class="hero-buttons">
        <a href="./resume.pdf" target="_blank">Resume</a>
        <a href="https://github.com/coder-ocean" target="_blank">GitHub</a>
        <a href="https://www.linkedin.com/in/sagar-awasthi-it-services" target="_blank">LinkedIn</a>
    </div>
</header>

<section>
<h2>🚀 Selected Work</h2>

<div class="card">
    <h3>CI/CD Pipeline</h3>
    <a href="https://github.com/coder-ocean/ares-cicd" target="_blank">View Code →</a>
</div>

<div class="card">
    <h3>Multi EC2 Deployment</h3>
    <a href="https://github.com/coder-ocean/flask-express-2ec2-app" target="_blank">View Code →</a>
</div>

<div class="card">
    <h3>AWS EC2 App</h3>
    <a href="https://github.com/coder-ocean/flask-express-ec2-app" target="_blank">View Code →</a>
</div>

<div class="card">
    <h3>Kubernetes Deployment</h3>
    <a href="https://github.com/coder-ocean/K8s-app" target="_blank">View Code →</a>
</div>

</section>

<section>
<h2>📊 GitHub Activity</h2>

<div class="github-container">

<img class="github-img"
src="https://streak-stats.demolab.com?user=coder-ocean&theme=tokyonight"
onerror="this.style.display='none'" />

<img class="github-img"
src="https://github-readme-activity-graph.vercel.app/graph?username=coder-ocean&theme=tokyo-night"
onerror="this.style.display='none'" />

<img class="github-img"
src="https://ghchart.rshah.org/38bdf8/coder-ocean"
onerror="this.style.display='none'" />

</div>

</section>

<section>
<h2>📬 Contact</h2>

<div class="contact-container">
<form action="https://formspree.io/f/mzdkzrzk" method="POST">
    <input type="text" name="name" placeholder="Your Name" required>
    <input type="email" name="email" placeholder="Your Email" required>
    <textarea name="message" rows="5" placeholder="Your Message" required></textarea>
    <button type="submit">Send</button>
</form>
</div>

</section>

<section>
<div class="socials">
<a href="https://github.com/coder-ocean" target="_blank"><i class="fab fa-github"></i></a>
<a href="https://www.linkedin.com/in/sagar-awasthi-it-services" target="_blank"><i class="fab fa-linkedin"></i></a>
</div>
</section>

<script>
const roles=["DevOps Engineer","Cloud Engineer","CI/CD Specialist"];
let i=0,j=0,del=false;
function type(){
let text=roles[i];
j=del?j-1:j+1;
document.querySelector(".typing").textContent=text.substring(0,j);
if(!del&&j===text.length){del=true;setTimeout(type,1000);return;}
if(del&&j===0){del=false;i=(i+1)%roles.length;}
setTimeout(type,del?50:100);
}
type();
</script>

</body>
</html>
